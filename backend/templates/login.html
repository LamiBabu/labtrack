<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - LabTrack</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔬</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="login-wrapper">
            <div class="login-card">
                <h1>🔐 LabTrack Admin Login</h1>
                <p class="login-subtitle">Lab Asset Management System</p>

                {% if error %}
                    <div class="error-message">
                        ⚠️ {{ error }}
                    </div>
                {% endif %}

                <form method="POST" class="login-form">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" placeholder="Enter your username" required autofocus>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    </div>

                    <button type="submit" class="btn-login">Login</button>
                </form>

                <p class="login-footer">© 2026 LabTrack - Lab Asset Management</p>
                <p style="text-align:center;margin-top:12px;font-size:0.85rem;color:#64748b;">
                    Student? <a href="/student/login" style="color:#ff4757;">Login here</a>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
