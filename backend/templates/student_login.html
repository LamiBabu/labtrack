<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login - LabTrack</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔬</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="login-wrapper">
            <div class="login-card" style="max-width:440px;">

                <div style="text-align:center;margin-bottom:28px;">
                    <div style="font-size:3.5rem;margin-bottom:12px;">🎓</div>
                    <h1 style="margin:0 0 6px 0;font-size:1.8rem;color:#f1f5f9;">Student Portal</h1>
                    <p class="login-subtitle">LabTrack — Sign in to your account</p>
                </div>

                {% if error %}
                    <div class="error-message">⚠️ {{ error }}</div>
                {% endif %}

                <form method="POST" class="login-form">
                    <div class="form-group" style="margin-bottom:20px;">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username"
                               placeholder="Enter your username" required autofocus>
                    </div>
                    <div class="form-group" style="margin-bottom:28px;">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password"
                               placeholder="Enter your password" required>
                    </div>
                    <button type="submit" class="btn-login">🔓 Login</button>
                </form>

                <div style="text-align:center;margin-top:20px;padding-top:20px;border-top:1px solid rgba(239,68,68,0.15);">
                    <p style="color:#64748b;font-size:0.85rem;margin:0;">
                        Admin? <a href="/login" style="color:#ff4757;font-weight:600;">Login here →</a>
                    </p>
                </div>

                <p class="login-footer">© 2026 LabTrack</p>
            </div>
        </div>
    </div>
</body>
</html>
